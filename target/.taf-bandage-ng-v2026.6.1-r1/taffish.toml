[package]
name = "bandage-ng"
kind = "tool"
version = "2026.6.1"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["genomics", "assembly", "assembly-graph", "visualization", "viewer"]
keywords = ["bandage-ng", "bandageng", "bandage", "gfa", "fastg", "assembly-graph", "spades", "megahit", "novnc", "vnc"]
description = "BandageNG 2026.6.1 for interactive de novo assembly graph visualization through a browser-accessible noVNC session, with headless graph CLI commands included."

[repository]
url = "https://github.com/taffish/bandage-ng"

[command]
name = "taf-bandage-ng"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/bandage-ng:2026.6.1-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64"

[upstream]
name = "BandageNG"
type = "github"
repo = "asl/BandageNG"
homepage = "https://github.com/asl/BandageNG/wiki"
release_url = "https://github.com/asl/BandageNG/releases/tag/v2026.6.1"
downloads = "https://github.com/asl/BandageNG/releases/download/v2026.6.1/BandageNG-Linux-7c62642.AppImage"
version = "2026.6.1"
license = "GPL-3.0-or-later"
citation = "BandageNG is a modern fork of Bandage for interactive visualization of de novo assembly graphs. BandageNG upstream currently lists citation as TBD; for the original Bandage publication see Wick et al. 2015, Bioinformatics."
doi = "10.1093/bioinformatics/btv383"
pmid = "26099265"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 180
exist = ["BandageNG", "bandage-ng", "bandage-ng-gui", "Xvfb", "x11vnc", "websockify", "openbox", "makeblastdb", "blastn", "tblastn", "minimap2", "nhmmer", "hmmsearch", "curl", "sh"]
test = ["BandageNG --version | grep -Fx '2026.6.1' >/dev/null && bandage-ng --version | grep -Fx 'BandageNG 2026.6.1' >/dev/null", "BandageNG --help | grep -F 'BandageNG' >/dev/null && BandageNG info --help | grep -F 'Display information about a graph' >/dev/null && bandage-ng --help | grep -F 'direct launcher for BandageNG 2026.6.1' >/dev/null && bandage-ng-gui --help | grep -F 'browser-accessible noVNC session' >/dev/null", "bandage-ng 2>&1 | grep -F 'no X DISPLAY is available' >/dev/null", "makeblastdb -version 2>&1 | grep -F 'makeblastdb' >/dev/null && blastn -version 2>&1 | grep -F 'blastn' >/dev/null && tblastn -version 2>&1 | grep -F 'tblastn' >/dev/null && minimap2 --version >/dev/null && nhmmer -h 2>&1 | grep -F 'HMMER' >/dev/null && hmmsearch -h 2>&1 | grep -F 'HMMER' >/dev/null", "mkdir -p /tmp/taf-bandage-ng-smoke && cd /tmp/taf-bandage-ng-smoke && printf 'H\\tVN:Z:1.0\\nS\\t1\\tACGTACGT\\nS\\t2\\tTTTT\\nL\\t1\\t+\\t2\\t+\\t0M\\n' > tiny.gfa && bandage-ng info tiny.gfa | grep -F 'Node count:' >/dev/null && bandage-ng image tiny.gfa tiny.svg >/tmp/taf-bandage-ng-image.log 2>&1 && test -s tiny.svg && grep -F '<svg' tiny.svg >/dev/null", "bandage-ng-gui --help >/dev/null && (bandage-ng-gui --geometry 800x600 >/tmp/taf-bandage-ng-gui.log 2>&1 & pid=$!; ok=0; i=0; while [ $i -lt 45 ]; do if curl -fs http://127.0.0.1:5801/vnc.html >/dev/null 2>&1; then ok=1; break; fi; i=$((i + 1)); sleep 1; done; kill $pid 2>/dev/null || true; wait $pid >/dev/null 2>&1 || true; test $ok -eq 1 && grep -F 'http://127.0.0.1:5801/vnc.html?autoconnect=1&resize=scale' /tmp/taf-bandage-ng-gui.log >/dev/null && grep -F 'BandageNG GUI is starting.' /tmp/taf-bandage-ng-gui.log >/dev/null)"]
